name: 🤖 Daily Trading Bot

on:
  schedule:
    # Runs every 30 mins from 8am to 6pm Singapore time (UTC+8)
    # SGT 8:00am  = UTC 0:00
    # SGT 6:00pm  = UTC 10:00
    - cron: '0,30 0-10 * * 1-5'  # Mon-Fri every 30 mins

  workflow_dispatch:  # Manual trigger button in GitHub ✅

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🤖 Run Trading Bot
        env:
          OKX_API_KEY:       ${{ secrets.OKX_API_KEY }}
          OKX_SECRET_KEY:    ${{ secrets.OKX_SECRET_KEY }}
          OKX_PASSPHRASE:    ${{ secrets.OKX_PASSPHRASE }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: 💾 Save trade logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-logs-${{ github.run_number }}
          path: |
            trades_*.json
            performance_log.txt
          retention-days: 30
